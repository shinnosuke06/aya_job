<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勤怠・給料管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        input, select, textarea, button { font-size: 16px !important; }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-active { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .tab-inactive { color: #9ca3af; }
        body { background-color: #fdf2f8; -webkit-font-smoothing: antialiased; }
        .paid-item { opacity: 0.6; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <header class="bg-pink-500 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-piggy-bank mr-2"></i>給与＆家計管理</h1>
        <div class="flex items-center bg-pink-600 rounded-full px-3 py-1">
            <button onclick="changeMonth(-1)" class="px-2 text-white"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="headerMonth" class="px-2 font-bold min-w-[80px] text-center"></span>
            <button onclick="changeMonth(1)" class="px-2 text-white"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </header>

    <main id="app-content" class="p-4 max-w-lg mx-auto relative min-h-[80vh]"></main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-pink-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-10">
        <div class="flex justify-around max-w-lg mx-auto">
            <button onclick="switchTab('home')" id="tab-home" class="flex-1 py-3 text-center tab-active flex flex-col items-center transition">
                <i class="fa-solid fa-chart-pie mb-1 text-lg"></i><span class="text-xs">ホーム</span>
            </button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="flex-1 py-3 text-center tab-inactive flex flex-col items-center transition">
                <i class="fa-regular fa-calendar-alt mb-1 text-lg"></i><span class="text-xs">カレンダー</span>
            </button>
            <button onclick="switchTab('expenses')" id="tab-expenses" class="flex-1 py-3 text-center tab-inactive flex flex-col items-center transition">
                <i class="fa-solid fa-wallet mb-1 text-lg"></i><span class="text-xs">支払い</span>
            </button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 text-center tab-inactive flex flex-col items-center transition">
                <i class="fa-solid fa-cog mb-1 text-lg"></i><span class="text-xs">設定</span>
            </button>
        </div>
    </nav>

    <!-- 勤怠入力モーダル -->
    <div id="workModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 id="modalDateTitle" class="text-xl font-bold text-pink-600">日付</h2>
                <button onclick="closeModal('workModal')" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <input type="hidden" id="modalDate">
            
            <div class="mb-4 bg-pink-50 p-4 rounded-xl border border-pink-100">
                <h3 class="font-bold text-pink-700 mb-2 border-b border-pink-200 pb-1" id="lbl-job1-name">仕事1</h3>
                <div class="mb-3">
                    <label class="block text-sm text-gray-700 mb-1">出勤状況</label>
                    <div class="flex space-x-2">
                        <button type="button" id="btn-status-none" onclick="setJob1Status('')" class="flex-1 py-2 rounded border border-gray-300 bg-white text-gray-500 text-sm">未設定</button>
                        <button type="button" id="btn-status-work" onclick="setJob1Status('work')" class="flex-1 py-2 rounded border border-pink-300 bg-white text-pink-600 text-sm">出勤</button>
                        <button type="button" id="btn-status-absent" onclick="setJob1Status('absent')" class="flex-1 py-2 rounded border border-red-300 bg-white text-red-600 text-sm">欠勤</button>
                    </div>
                    <input type="hidden" id="modalJob1Status">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">残業時間 (時間)</label>
                    <input type="number" id="modalJob1Overtime" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-pink-500" step="0.5" min="0">
                </div>
            </div>

            <div class="mb-4 bg-orange-50 p-4 rounded-xl border border-orange-100">
                <h3 class="font-bold text-orange-700 mb-2 border-b border-orange-200 pb-1" id="lbl-job2-name">仕事2</h3>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">実働時間 (時間)</label>
                    <input type="number" id="modalJob2Hours" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-orange-500" step="0.5" min="0">
                </div>
            </div>

            <!-- 臨時収入セクション -->
            <div class="mb-6 bg-yellow-50 p-4 rounded-xl border border-yellow-100">
                <button type="button" onclick="document.getElementById('extraIncomeFields').classList.toggle('hidden')" class="w-full flex justify-between items-center font-bold text-yellow-700">
                    <span><i class="fa-solid fa-sack-dollar mr-1"></i> 臨時収入を入力</span>
                    <i class="fa-solid fa-chevron-down text-sm"></i>
                </button>
                <div id="extraIncomeFields" class="hidden space-y-2 mt-3 border-t border-yellow-200 pt-3">
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">金額 (円)</label>
                        <input type="number" id="modalExtraAmount" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-yellow-500" min="0" placeholder="例: 10000">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">メモ</label>
                        <input type="text" id="modalExtraMemo" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-yellow-500" placeholder="例: お祝い金">
                    </div>
                </div>
            </div>

            <div class="flex justify-end space-x-3">
                <button onclick="closeModal('workModal')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">キャンセル</button>
                <button onclick="requestSaveWorkData()" class="px-4 py-2 bg-pink-500 text-white font-bold rounded-lg shadow hover:bg-pink-600">保存する</button>
            </div>
        </div>
    </div>

    <!-- 支払い項目設定モーダル -->
    <div id="expenseItemModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-md">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-gray-700" id="ei-title">支払い項目の設定</h2>
                <button onclick="closeModal('expenseItemModal')" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <input type="hidden" id="ei-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">種類</label>
                    <select id="ei-type" onchange="onExpenseTypeChange()" class="w-full border border-gray-300 rounded p-2 bg-white">
                        <option value="fixed">固定費 (家賃, 保険など)</option>
                        <option value="variable">変動費 (食費, 雑費など)</option>
                        <option value="card">カード</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">項目名</label>
                    <input type="text" id="ei-name" placeholder="例: 家賃" class="w-full border border-gray-300 rounded p-2">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">基本の金額 (円)</label>
                    <input type="number" id="ei-default-amount" placeholder="例: 10000" class="w-full border border-gray-300 rounded p-2">
                    <p class="text-[10px] text-gray-500 mt-1">※固定費など毎月同じ金額の場合は入力しておくと便利です</p>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">引き落とし口座</label>
                    <select id="ei-account" class="w-full border border-gray-300 rounded p-2 bg-white">
                        <!-- JSで動的に追加 -->
                    </select>
                </div>
            </div>
            <div class="flex justify-between mt-6">
                <button id="ei-delete-btn" onclick="deleteExpenseItem()" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg hidden">削除</button>
                <div class="flex space-x-3 ml-auto">
                    <button onclick="closeModal('expenseItemModal')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">キャンセル</button>
                    <button onclick="saveExpenseItem()" class="px-4 py-2 bg-pink-500 text-white font-bold rounded-lg shadow hover:bg-pink-600">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 支払い記録入力モーダル -->
    <div id="expenseRecordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm text-center">
            <h2 class="text-lg font-bold text-gray-700 mb-2" id="er-name"></h2>
            <p class="text-sm text-gray-500 mb-4" id="er-month"></p>
            <input type="hidden" id="er-id">
            <input type="hidden" id="er-target-month">
            <div class="mb-4">
                <input type="number" id="er-amount" placeholder="金額 (円)" class="w-full border border-gray-300 rounded p-3 text-center text-xl font-bold">
            </div>
            <label class="flex items-center justify-center space-x-2 mb-6 cursor-pointer bg-gray-50 py-3 rounded-lg border border-gray-200">
                <input type="checkbox" id="er-ispaid" class="w-6 h-6 text-pink-500 rounded border-gray-300 focus:ring-pink-500">
                <span class="font-bold text-gray-700 text-lg">支払いを「済」にする</span>
            </label>
            <div class="flex justify-center space-x-3">
                <button onclick="closeModal('expenseRecordModal')" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-full font-bold">閉じる</button>
                <button onclick="saveExpenseRecord()" class="px-6 py-2 bg-pink-500 text-white font-bold rounded-full shadow-md">決定</button>
            </div>
        </div>
    </div>

    <!-- 口座登録モーダル -->
    <div id="accountModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-md">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-blue-600">口座の登録・編集</h2>
                <button onclick="closeModal('accountModal')" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <input type="hidden" id="ac-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">口座名・銀行名</label>
                    <input type="text" id="ac-name" placeholder="例: ゆうちょ銀行" class="w-full border border-gray-300 rounded p-2">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">実際の残高 (円)</label>
                    <input type="number" id="ac-balance" placeholder="例: 150000" class="w-full border border-gray-300 rounded p-2">
                    <p class="text-[10px] text-gray-500 mt-1">※銀行等で確認した時点の残高を入力してください</p>
                </div>
            </div>
            <div class="flex justify-between mt-6">
                <button id="ac-delete-btn" onclick="deleteAccount()" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg hidden">削除</button>
                <div class="flex space-x-3 ml-auto">
                    <button onclick="closeModal('accountModal')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">キャンセル</button>
                    <button onclick="saveAccount()" class="px-4 py-2 bg-blue-500 text-white font-bold rounded-lg shadow hover:bg-blue-600">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 汎用確認・アラートモーダル -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center">
            <div class="text-pink-500 mb-4 text-4xl"><i class="fa-solid fa-circle-exclamation"></i></div>
            <p id="confirmMessage" class="mb-6 text-gray-800 font-bold whitespace-pre-line leading-relaxed"></p>
            <div class="flex justify-center space-x-4">
                <button onclick="closeConfirm()" class="px-6 py-2 bg-gray-200 rounded-full text-gray-700 font-bold">キャンセル</button>
                <button id="confirmOkBtn" class="px-6 py-2 bg-pink-500 rounded-full text-white font-bold shadow-md">OK</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center">
            <p id="alertMessage" class="mb-6 text-gray-800 font-bold whitespace-pre-line"></p>
            <button onclick="closeAlert()" class="px-6 py-2 bg-pink-500 rounded-full text-white font-bold shadow-md w-full">確認</button>
        </div>
    </div>

    <script>
        // XSS対策（エスケープ処理）関数
        const escapeHTML = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>"'`=\/]/g, s => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;', '`': '&#x60;', '=': '&#x3D;'
            }[s]));
        };

        const defaultData = {
            settings: {
                job1: { 
                    name: "エノモト工業", 
                    dailyWage: 10000, 
                    overtimeHourlyWage: 1500, 
                    tax: 40000,
                    customWorkDays: [] // 特例の出勤日（配列）
                },
                job2: { name: "くろちゃん", hourlyWage: 1000 }
            },
            workRecords: {}, 
            accounts: [], 
            expenseItems: [], 
            expenseRecords: {} 
        };

        let appData = JSON.parse(localStorage.getItem('kintaiAppData')) || defaultData;
        if (!appData.accounts) appData.accounts = [];
        if (!appData.expenseItems) {
            appData.expenseItems = [];
            appData.expenseRecords = {};
        }
        // 古いデータ形式のマイグレーション
        if (!appData.settings.job1.customWorkDays) {
            appData.settings.job1.customWorkDays = [];
        }

        let currentTab = 'home';
        let currentExpenseSubTab = 'list'; 
        let currentDate = new Date();
        let chartInstance = null;
        let expenseChartInstance = null;
        let currentChartType = 'month'; 
        let currentExpenseGraphType = 'month'; 
        let selectedGraphDetail = null;
        let holidaysData = {};

        async function fetchHolidays() {
            try {
                const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
                holidaysData = await res.json();
                if(currentTab === 'calendar') render();
            } catch (e) {
                console.log("祝日データの取得に失敗しました");
            }
        }
        fetchHolidays();

        function getFallbackHoliday(year, month, day) {
            const fixedHolidays = {
                '1-1': '元日', '2-11': '建国記念の日', '2-23': '天皇誕生日',
                '4-29': '昭和の日', '5-3': '憲法記念日', '5-4': 'みどりの日', '5-5': 'こどもの日',
                '8-11': '山の日', '11-3': '文化の日', '11-23': '勤労感謝の日'
            };
            const key = `${month+1}-${day}`;
            let hName = fixedHolidays[key];

            const getNthMonday = (y, m, nth) => {
                let d = new Date(y, m, 1);
                let count = 0;
                while(d.getMonth() === m) {
                    if(d.getDay() === 1) {
                        count++;
                        if(count === nth) return d.getDate();
                    }
                    d.setDate(d.getDate() + 1);
                }
                return -1;
            };

            if(month === 0 && day === getNthMonday(year, 0, 2)) hName = '成人の日';
            if(month === 6 && day === getNthMonday(year, 6, 3)) hName = '海の日';
            if(month === 8 && day === getNthMonday(year, 8, 3)) hName = '敬老の日';
            if(month === 9 && day === getNthMonday(year, 9, 2)) hName = 'スポーツの日';

            if(month === 2) {
                const shunbun = Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
                if(day === shunbun) hName = '春分の日';
            }
            if(month === 8) {
                const shubun = Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
                if(day === shubun) hName = '秋分の日';
            }

            if(hName) return hName;

            let prevD = new Date(year, month, day - 1);
            if(prevD.getDay() === 0) {
                const prevHol = getFallbackHoliday(prevD.getFullYear(), prevD.getMonth(), prevD.getDate());
                if(prevHol && prevHol !== '振替休日') return '振替休日';
            }
            if(month === 4 && day === 6) {
                if(new Date(year, 4, 3).getDay()===0 || new Date(year, 4, 4).getDay()===0 || new Date(year, 4, 5).getDay()===0) return '振替休日';
            }
            if(month === 8) {
                const keiroDay = getNthMonday(year, 8, 3);
                const shubunDay = Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
                if(shubunDay - keiroDay === 2 && day === keiroDay + 1) return '国民の休日';
            }
            return "";
        }

        function getHolidayName(year, month, day) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            if (holidaysData[dateStr]) return holidaysData[dateStr];
            return getFallbackHoliday(year, month, day);
        }

        function saveData() { localStorage.setItem('kintaiAppData', JSON.stringify(appData)); }

        function openModal(id) { 
            document.getElementById(id).classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden');
            document.body.style.overflow = ''; 
        }
        function showAlert(msg) { document.getElementById('alertMessage').innerText = msg; openModal('alertModal'); }
        function closeAlert() { closeModal('alertModal'); }
        
        let confirmCallback = null;
        function showConfirm(msg, callback) {
            document.getElementById('confirmMessage').innerText = msg;
            confirmCallback = callback;
            openModal('confirmModal');
        }
        function closeConfirm() { closeModal('confirmModal'); confirmCallback = null; }
        document.getElementById('confirmOkBtn').addEventListener('click', () => {
            if(confirmCallback) confirmCallback();
            closeConfirm();
        });

        function cleanupFutureData() {
            const today = new Date();
            const currentRealMonthStr = getMonthString(today);
            let dataModified = false;

            for (const mStr in appData.expenseRecords) {
                if (mStr > currentRealMonthStr) {
                    const recs = appData.expenseRecords[mStr];
                    appData.expenseItems.forEach(item => {
                        if (item.type === 'fixed' && recs[item.id]) {
                            if (!recs[item.id].isPaid && recs[item.id].amount !== '') {
                                recs[item.id].amount = '';
                                dataModified = true;
                            }
                        }
                    });
                }
            }
            if (dataModified) {
                saveData();
            }
        }

        function initializeMonthExpenses(targetDate) {
            const mStr = getMonthString(targetDate);
            if (!appData.expenseRecords[mStr]) appData.expenseRecords[mStr] = {};

            const today = new Date();
            const currentRealMonthStr = getMonthString(today);
            const isFutureMonth = mStr > currentRealMonthStr;

            appData.expenseItems.filter(i => !i.isDeleted).forEach(item => {
                let rec = appData.expenseRecords[mStr][item.id];

                if (!rec) {
                    let initialAmount = '';
                    if (!isFutureMonth && item.type === 'fixed' && item.defaultAmount > 0) {
                        initialAmount = item.defaultAmount;
                    }
                    appData.expenseRecords[mStr][item.id] = {
                        amount: initialAmount,
                        isPaid: false
                    };
                } else {
                    if (!isFutureMonth && item.type === 'fixed' && item.defaultAmount > 0) {
                        if (!rec.isPaid && (rec.amount === '' || rec.amount === 0)) {
                            rec.amount = item.defaultAmount;
                        }
                    }
                }
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            currentDate = new Date(); 
            selectedGraphDetail = null; 
            updateHeaderMonth();
            initializeMonthExpenses(currentDate);

            ['home', 'calendar', 'expenses', 'settings'].forEach(id => {
                const el = document.getElementById(`tab-${id}`);
                if(id === tabId) el.classList.replace('tab-inactive', 'tab-active');
                else el.classList.replace('tab-active', 'tab-inactive');
            });
            window.scrollTo(0, 0);
            render();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            selectedGraphDetail = null;
            updateHeaderMonth();
            initializeMonthExpenses(currentDate);
            render();
        }

        function updateHeaderMonth() {
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('headerMonth').innerText = `${y}/${m}`;
        }
        function getMonthString(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; }
        const fmt = (num) => Number(num || 0).toLocaleString();

        function getPaydayDate(year, month) {
            let d = new Date(year, month, 25);
            while (true) {
                let dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6 || getHolidayName(d.getFullYear(), d.getMonth(), d.getDate())) {
                    d.setDate(d.getDate() - 1); 
                } else {
                    return d.getDate();
                }
            }
        }

        function calculateSalary(targetDate) {
            const currentMonthStr = getMonthString(targetDate);
            const prevDate = new Date(targetDate.getFullYear(), targetDate.getMonth() - 1, 1);
            const prevMonthStr = getMonthString(prevDate);

            // 当月の「暦通りの所定労働日数」を計算
            let scheduledWorkDays = 0;
            const y = targetDate.getFullYear();
            const m = targetDate.getMonth();
            const lastDay = new Date(y, m + 1, 0).getDate();
            const customDays = appData.settings.job1.customWorkDays || [];
            
            for (let i = 1; i <= lastDay; i++) {
                const dateStrForCheck = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const d = new Date(y, m, i);
                const dayOfWeek = d.getDay();
                const isHoliday = getHolidayName(y, m, i) !== "";

                // 特例の出勤日リストに含まれている場合は、曜日や祝日に関わらず出勤日カウント
                if (customDays.includes(dateStrForCheck)) {
                    scheduledWorkDays++;
                } else if (!isHoliday && dayOfWeek >= 1 && dayOfWeek <= 5) {
                    // それ以外は、祝日ではない平日をカウント
                    scheduledWorkDays++;
                }
            }

            let job1PrevAbsent = 0, job1Overtime = 0, prevJob1Overtime = 0;
            let job2Hours = 0, prevJob2Hours = 0;
            let totalExtraIncome = 0;

            for (const [dateStr, record] of Object.entries(appData.workRecords)) {
                const month = dateStr.substring(0, 7);
                
                // 当月のデータ集計
                if (month === currentMonthStr) {
                    if (record.job1) {
                        if (record.job1.overtime) job1Overtime += parseFloat(record.job1.overtime);
                    }
                    if (record.job2 && record.job2.hours) job2Hours += parseFloat(record.job2.hours);
                    if (record.extraIncome && record.extraIncome.amount) totalExtraIncome += parseFloat(record.extraIncome.amount);
                }
                
                // 前月のデータ集計（翌月反映分）
                if (month === prevMonthStr) {
                    if (record.job1) {
                        if (record.job1.status === 'absent') {
                            job1PrevAbsent += 1; // 前月の欠勤日数
                        }
                        if (record.job1.overtime) {
                            prevJob1Overtime += parseFloat(record.job1.overtime); // 前月の残業実績
                        }
                    }
                    if (record.job2 && record.job2.hours) {
                        prevJob2Hours += parseFloat(record.job2.hours); // 前月の仕事2実績
                    }
                }
            }

            // 仕事1の給料：(所定労働日数 - 前月欠勤) × 日給 + 前月残業代 - 税金
            let job1BaseDays = Math.max(0, scheduledWorkDays - job1PrevAbsent);
            const job1BaseSalary = job1BaseDays * appData.settings.job1.dailyWage;
            const job1OvertimePay = prevJob1Overtime * appData.settings.job1.overtimeHourlyWage;
            const job1Gross = job1BaseSalary + job1OvertimePay;
            
            let job1Net = job1Gross > 0 ? Math.max(0, job1Gross - appData.settings.job1.tax) : 0;
            
            // 仕事2の給料：前月の実働時間 × 時給
            const job2Salary = prevJob2Hours * appData.settings.job2.hourlyWage;

            let expFixed = 0, expVar = 0, expCard = 0;
            const curRecs = appData.expenseRecords[currentMonthStr] || {};
            appData.expenseItems.forEach(item => {
                const r = curRecs[item.id];
                if(r && r.amount) {
                    if(item.type === 'fixed') expFixed += parseFloat(r.amount);
                    else if(item.type === 'variable') expVar += parseFloat(r.amount);
                    else if(item.type === 'card') expCard += parseFloat(r.amount);
                }
            });

            return {
                job1: { 
                    scheduledWorkDays: scheduledWorkDays, // 当月の所定出勤日数
                    prevAbsent: job1PrevAbsent, // 前月の欠勤数
                    baseDays: job1BaseDays, // 最終的な計算日数
                    overtime: job1Overtime, // 当月の残業時間（実績）
                    paidOvertime: prevJob1Overtime, // 給与に反映される前月の残業時間
                    net: job1Net, 
                    tax: appData.settings.job1.tax 
                },
                job2: { 
                    hours: job2Hours, // 当月の仕事2の実績
                    paidHours: prevJob2Hours, // 給与に反映される前月の仕事2の実績
                    salary: job2Salary 
                },
                extraIncome: totalExtraIncome,
                expenses: { fixed: expFixed, variable: expVar, card: expCard, total: expFixed + expVar + expCard },
                totalIncome: job1Net + job2Salary + totalExtraIncome
            };
        }

        function getBalancesForYear(targetYear) {
            const today = new Date();
            const curY = today.getFullYear();
            const curM = today.getMonth();
            const currentMonthStr = getMonthString(today);

            const currentTotalBalance = appData.accounts.reduce((sum, a) => sum + (parseFloat(a.balance)||0), 0);

            let pendingTotal = 0;
            let paidTotal = 0;
            const curRecs = appData.expenseRecords[currentMonthStr] || {};
            appData.expenseItems.forEach(item => {
                const r = curRecs[item.id];
                if(r && r.amount) {
                    if (!r.isPaid) pendingTotal += parseFloat(r.amount);
                    else paidTotal += parseFloat(r.amount);
                }
            });

            const baseBalance = currentTotalBalance - paidTotal - pendingTotal;
            function getMonthDiff(y, m) { return (y - curY) * 12 + (m - curM); }

            function calcBalanceAt(targetY, targetM) {
                let bal = baseBalance;
                const diff = getMonthDiff(targetY, targetM);

                if (diff === 0) return bal;

                if (diff > 0) {
                    let y = curY, m = curM + 1;
                    if(m > 11) { m = 0; y++; }
                    while (y < targetY || (y === targetY && m <= targetM)) {
                        const res = calculateSalary(new Date(y, m, 1));
                        bal += (res.totalIncome - res.expenses.total);
                        m++;
                        if(m > 11) { m = 0; y++; }
                    }
                } else {
                    let y = curY, m = curM;
                    while (y > targetY || (y === targetY && m > targetM)) {
                        const res = calculateSalary(new Date(y, m, 1));
                        bal -= (res.totalIncome - res.expenses.total);
                        m--;
                        if(m < 0) { m = 11; y--; }
                    }
                }
                return bal;
            }

            const incomeData = [];
            const expenseData = [];
            const balances = [];
            for(let m = 0; m < 12; m++) {
                const d = new Date(targetYear, m, 1);
                const mStr = getMonthString(d);
                const res = calculateSalary(d);
                
                incomeData.push(res.totalIncome);
                expenseData.push(res.expenses.total);
                
                const hasWork = Object.keys(appData.workRecords).some(k => k.startsWith(mStr));
                const hasExp = appData.expenseRecords[mStr] && Object.values(appData.expenseRecords[mStr]).some(r => parseFloat(r.amount) > 0);
                
                if (hasWork || hasExp) {
                    balances.push(calcBalanceAt(targetYear, m));
                } else {
                    balances.push(null);
                }
            }
            return { incomeData, expenseData, balances };
        }

                html += `<div class="py-2 text-center text-xs font-bold ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-600'}">${day}</div>`;
            });
            html += `</div><div class="grid grid-cols-7 gap-px bg-gray-200">`;

            for (let i = 0; i < startDay; i++) html += `<div class="bg-white min-h-[80px]"></div>`;

            for (let i = 1; i <= totalDays; i++) {
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const rec = appData.workRecords[dateStr] || {};
                const isCustomWorkDay = customDays.includes(dateStr);

                    if(rec.job1.status === 'work') badges += `<div class="text-[9px] bg-pink-100 text-pink-700 px-1 rounded mb-0.5 truncate">🏢出勤</div>`;
                    if(rec.job1.status === 'absent') badges += `<div class="text-[9px] bg-red-100 text-red-700 px-1 rounded mb-0.5 truncate">🏢欠勤</div>`;

                if(dayOfWeek === 6) dayColor = "text-blue-500";

                const dayOfWeek = d.getDay();

                const customDays = appData.settings.job1.customWorkDays || [];
                const isCustomWorkDay = customDays.includes(dateStr);

                if (isCustomWorkDay) {
                    // 特例の出勤日は曜日に関わらず初期値を「出勤」
                    initStatus = 'work';

        function renderGraphDetail() {
            if (!selectedGraphDetail) return '<div class="text-center text-sm text-gray-500 mt-6"><i class="fa-solid fa-hand-pointer text-gray-300 text-2xl mb-2 block"></i>グラフの要素をタップすると詳細が表示されます</div>';
            
            let html = '<div class="bg-white p-4 rounded-xl shadow border-t-4 border-pink-400 mt-4"><h4 class="font-bold text-gray-700 mb-3 border-b pb-2">';
            let listItems = [];

            if (selectedGraphDetail.type === 'year') {
                const m = selectedGraphDetail.index;
                const mStr = `${currentDate.getFullYear()}-${String(m + 1).padStart(2, '0')}`;
                html += `${m + 1}月の支払い詳細</h4>`;
                
                const curRecs = appData.expenseRecords[mStr] || {};
                appData.expenseItems.forEach(item => {
                    const rec = curRecs[item.id];
                    if (rec && rec.amount > 0) listItems.push({ item, rec, mStr });
                });
            } else if (selectedGraphDetail.type === 'month') {
                const types = ['fixed', 'variable', 'card'];
                const typeNames = ['固定費', '変動費', 'カード'];
                const typeColors = ['text-blue-600', 'text-amber-600', 'text-purple-600'];
                const t = types[selectedGraphDetail.index];
                const tName = typeNames[selectedGraphDetail.index];
                const mStr = getMonthString(currentDate);
                
                html += `<span class="${typeColors[selectedGraphDetail.index]}">${tName}</span> の詳細 (${currentDate.getMonth()+1}月)</h4>`;

                const curRecs = appData.expenseRecords[mStr] || {};
                appData.expenseItems.filter(i => i.type === t).forEach(item => {
                    const rec = curRecs[item.id];
                    if (rec && rec.amount > 0) listItems.push({ item, rec, mStr });
                });
            }

            if (listItems.length === 0) {
                html += '<p class="text-sm text-gray-500">登録がありません</p>';
            } else {
                html += '<div class="space-y-2">';
                listItems.forEach(d => {
                    html += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100 cursor-pointer hover:bg-pink-50 transition" onclick="openExpenseRecordModal(${d.item.id}, '${d.mStr}')">
                            <div class="flex items-center space-x-2">
                                ${d.rec.isPaid ? '<span class="text-[10px] bg-pink-100 text-pink-600 px-1.5 py-0.5 rounded font-bold">済</span>' : ''}
                                <span class="font-bold ${d.item.isDeleted ? 'text-gray-400 line-through' : 'text-gray-800'}">${escapeHTML(d.item.name)}</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="font-bold text-gray-700">${fmt(d.rec.amount)}円</span>
                                <i class="fa-solid fa-pen text-gray-300 text-sm"></i>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function drawExpenseChart() {
            const ctx = document.getElementById('expenseDetailChart');
            if(!ctx) return;
            
            if (currentExpenseGraphType === 'month') {
                const s = calculateSalary(currentDate);
                const hasData = s.expenses.total > 0;
                expenseChartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['固定費', '変動費', 'カード'],
                        datasets: [{
                            data: hasData ? [s.expenses.fixed, s.expenses.variable, s.expenses.card] : [1,1,1],
                            backgroundColor: hasData ? ['#60a5fa', '#fbbf24', '#a78bfa'] : ['#e5e7eb','#e5e7eb','#e5e7eb'],
                            borderWidth: 2, borderColor: '#ffffff'
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        onClick: (e, elements) => {
                            if (elements.length > 0 && hasData) showGraphDetail('month', elements[0].index);
                        },
                        plugins: { 
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        if(!hasData) return "データなし";
                                        return context.label + ': ' + fmt(context.raw) + '円';
                                    }
                                }
                            }
                        } 
                    }
                });
            } else {
                const y = currentDate.getFullYear();
                const { expenseData, balances } = getBalancesForYear(y);

                expenseChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                        datasets: [
                            { 
                                type: 'line', 
                                label: '引き落とし後残高', 
                                data: balances, 
                                borderColor: '#10b981', 
                                backgroundColor: '#10b981', 
                                borderWidth: 2, 
                                pointRadius: 4, 
                                tension: 0.1,
                                spanGaps: true
                            },
                            { 
                                type: 'bar', 
                                label: '支出合計', 
                                data: expenseData, 
                                backgroundColor: '#60a5fa' 
                            }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        onClick: (e, elements) => {
                            if (elements.length > 0) {
                                showGraphDetail('year', elements[0].index);
                            }
                        }
                    }
                });
            }
        }

        function onExpenseTypeChange() {
            const t = document.getElementById('ei-type').value;
            document.getElementById('ei-name').placeholder = t === 'card' ? "例: 楽天カード (光熱費など)" : "例: 家賃、食費";
        }

        function openExpenseItemModal(id = null) {
            const accSelect = document.getElementById('ei-account');
            accSelect.innerHTML = '<option value="">指定なし</option>' + appData.accounts.map(a => `<option value="${a.id}">${escapeHTML(a.name)}</option>`).join('');

            if (id) {
                const item = appData.expenseItems.find(i => i.id === id);
                document.getElementById('ei-title').innerText = "支払い項目の編集";
                document.getElementById('ei-id').value = item.id;
                document.getElementById('ei-type').value = item.type;
                document.getElementById('ei-name').value = item.name;
                document.getElementById('ei-default-amount').value = item.defaultAmount || '';
                document.getElementById('ei-account').value = item.accountId || '';
                document.getElementById('ei-delete-btn').classList.remove('hidden');
            } else {
                document.getElementById('ei-title').innerText = "新しい支払い項目を追加";
                document.getElementById('ei-id').value = '';
                document.getElementById('ei-type').value = 'fixed';
                document.getElementById('ei-name').value = '';
                document.getElementById('ei-default-amount').value = '';
                document.getElementById('ei-account').value = '';
                document.getElementById('ei-delete-btn').classList.add('hidden');
            }
            onExpenseTypeChange();
            openModal('expenseItemModal');
        }

        function saveExpenseItem() {
            const id = document.getElementById('ei-id').value;
            const name = document.getElementById('ei-name').value;
            const defAmountStr = document.getElementById('ei-default-amount').value;
            if(!name) return showAlert("項目名を入力してください");

            const parsedDefAmount = defAmountStr ? parseFloat(defAmountStr) : 0;

            const data = {
                id: id ? parseInt(id) : Date.now(),
                type: document.getElementById('ei-type').value,
                name: name,
                defaultAmount: parsedDefAmount,
                accountId: document.getElementById('ei-account').value,
                isDeleted: false
            };

            if(id) {
                const idx = appData.expenseItems.findIndex(i => i.id == id);
                if(idx > -1) {
                    data.isDeleted = appData.expenseItems[idx].isDeleted; 
                    appData.expenseItems[idx] = data;
                }
            } else {
                appData.expenseItems.push(data);
            }

            const mStr = getMonthString(currentDate);
            if (!appData.expenseRecords[mStr]) appData.expenseRecords[mStr] = {};
            if (!appData.expenseRecords[mStr][data.id]) {
                appData.expenseRecords[mStr][data.id] = {
                    amount: '',
                    isPaid: false
                };
            }

            saveData(); 
            closeModal('expenseItemModal'); 
            initializeMonthExpenses(currentDate);
            render();
        }

        function deleteExpenseItem() {
            const id = parseInt(document.getElementById('ei-id').value);
            showConfirm("この項目を削除しますか？\n(過去の集計データは保持されます)", () => {
                const item = appData.expenseItems.find(i => i.id === id);
                if (item) item.isDeleted = true;
                saveData(); closeModal('expenseItemModal'); render();
            });
        }

        function openExpenseRecordModal(itemId, monthStr = null) {
            const targetMonthStr = monthStr || getMonthString(currentDate);
            const item = appData.expenseItems.find(i => i.id === itemId);
            const rec = (appData.expenseRecords[targetMonthStr] || {})[itemId] || { amount: '', isPaid: false };
            
            document.getElementById('er-name').innerText = item.name;
            const [y, m] = targetMonthStr.split('-');
            document.getElementById('er-month').innerText = `${y}年${parseInt(m)}月分`;
            
            document.getElementById('er-id').value = itemId;
            document.getElementById('er-target-month').value = targetMonthStr; 
            document.getElementById('er-amount').value = rec.amount || '';
            document.getElementById('er-ispaid').checked = rec.isPaid;
            
            openModal('expenseRecordModal');
        }

        function saveExpenseRecord() {
            const itemId = document.getElementById('er-id').value;
            const amount = document.getElementById('er-amount').value;
            const isPaid = document.getElementById('er-ispaid').checked;
            const mStr = document.getElementById('er-target-month').value;

            if(!appData.expenseRecords[mStr]) appData.expenseRecords[mStr] = {};
            appData.expenseRecords[mStr][itemId] = {
                amount: amount ? parseFloat(amount) : 0,
                isPaid: isPaid
            };
            
            if(selectedGraphDetail) {
                const detailArea = document.getElementById('graph-detail-area');
                if(detailArea) detailArea.innerHTML = renderGraphDetail();
            }

            saveData(); closeModal('expenseRecordModal'); render();
        }

        function togglePaid(itemId, isChecked) {
            const mStr = getMonthString(currentDate);
            if(!appData.expenseRecords[mStr]) appData.expenseRecords[mStr] = {};
            if(!appData.expenseRecords[mStr][itemId]) appData.expenseRecords[mStr][itemId] = { amount: 0 };
            appData.expenseRecords[mStr][itemId].isPaid = isChecked;
            saveData(); 
            
            const scrollPos = window.scrollY;
            render();
            window.scrollTo(0, scrollPos);
        }

        function addCustomWorkDayToDOM() {
            const dateInput = document.getElementById('newCustomWorkDay');
            const dateVal = dateInput.value;
            if (!dateVal) return;
            
            // 重複チェック
            const existing = Array.from(document.querySelectorAll('.custom-day-chip')).map(el => el.getAttribute('data-date'));
            if (existing.includes(dateVal)) {
                showAlert("既にリストに追加されています");
                return;

            const [y, m, d] = dateVal.split('-');
            const chipHtml = `
                <span class="custom-day-chip bg-white border border-pink-300 text-pink-700 px-2 py-1 rounded-full text-xs flex items-center shadow-sm" data-date="${dateVal}">

                    <button type="button" onclick="this.parentElement.remove()" class="ml-1 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                </span>
            `;
            document.getElementById('customWorkDaysList').insertAdjacentHTML('beforeend', chipHtml);
            dateInput.value = '';
        }

            appData.settings.job1.overtimeHourlyWage = parseFloat(document.getElementById('s_job1_overtime').value) || 0;
            appData.settings.job1.tax = parseFloat(document.getElementById('s_job1_tax').value) || 0;
            appData.settings.job2.name = document.getElementById('s_job2_name').value;
            appData.settings.job2.hourlyWage = parseFloat(document.getElementById('s_job2_hourly').value) || 0;

                document.getElementById('ac-name').value = acc.name;
                document.getElementById('ac-balance').value = acc.balance;
                document.getElementById('ac-delete-btn').classList.remove('hidden');
            } else {
                document.getElementById('ac-id').value = '';
                document.getElementById('ac-name').value = '';
                document.getElementById('ac-balance').value = '';
                document.getElementById('ac-delete-btn').classList.add('hidden');
            }
            openModal('accountModal');
        }

        function saveAccount() {
            const id = document.getElementById('ac-id').value;
            const name = document.getElementById('ac-name').value;
            const balance = document.getElementById('ac-balance').value;
            if(!name) return showAlert("口座名を入力してください");

            const now = new Date();
            const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: name,
                balance: parseFloat(balance) || 0,
                lastUpdated: dateStr
            };

            if (id) {
                const idx = appData.accounts.findIndex(a => a.id == id);
                if(idx > -1) appData.accounts[idx] = data;
            } else {
                appData.accounts.push(data);
            }
            saveData(); closeModal('accountModal'); render();
        }

        function deleteAccount() {
            const id = parseInt(document.getElementById('ac-id').value);
            showConfirm("この口座を削除しますか？", () => {
                appData.accounts = appData.accounts.filter(a => a.id !== id);
                appData.expenseItems.forEach(item => { if(item.accountId == id) item.accountId = ''; });
                saveData(); closeModal('accountModal'); render();
            });
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const dlNode = document.createElement('a');
            dlNode.setAttribute("href", dataStr);
            dlNode.setAttribute("download", "kintai_data.json");
            document.body.appendChild(dlNode);
            dlNode.click();
            dlNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            showConfirm("現在のデータは上書きされます。よろしいですか？", () => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if(importedData && importedData.settings && importedData.workRecords) {
                            appData = importedData;
                            
                            appData.expenseItems.forEach(item => {
                                if (item.isDeleted === undefined) item.isDeleted = false;
                            });
                            if (!appData.settings.job1.customWorkDays) {
                                appData.settings.job1.customWorkDays = [];
                            }

                            cleanupFutureData(); 
                            saveData();
                            render();
                            showAlert("データを読み込みました！");
                        } else {
                            showAlert("ファイルの形式が正しくありません。");
                        }
                    } catch (error) {
                        showAlert("ファイルの読み込みに失敗しました。");
                    }
                };
                reader.readAsText(file);
            });
            event.target.value = '';
        }

        cleanupFutureData();
        initializeMonthExpenses(currentDate);
        updateHeaderMonth();
        render();

    </script>
</body>
</html>
